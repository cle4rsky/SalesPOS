// ── PromptPay EMV QR ──────────────────────────────────────────
function crc16(str){
  let crc=0xFFFF;
  for(let i=0;i<str.length;i++){
    crc^=str.charCodeAt(i)<<8;
    for(let j=0;j<8;j++) crc=(crc&0x8000)?((crc<<1)^0x1021)&0xFFFF:(crc<<1)&0xFFFF;
  }
  return crc.toString(16).toUpperCase().padStart(4,"0");
}
function tlv(tag,value){return tag+String(value.length).padStart(2,"0")+value;}
function buildPromptPayQR(phone,amount){
  const d=phone.replace(/\D/g,"");
  const norm=d.startsWith("0")&&d.length===10?"0066"+d.slice(1):d;
  const merchant=tlv("29",tlv("00","A000000677010111")+tlv("01",norm));
  let p=tlv("00","01")+tlv("01","12")+merchant+tlv("53","764");
  if(amount>0) p+=tlv("54",amount.toFixed(2));
  p+=tlv("58","TH")+"6304";
  return p+crc16(p);
}

// ── QR Canvas ────────────────────────────────────────────────
function QRCanvas({payload,size=200}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!payload) return;
    ref.current.innerHTML="";
    try{
      new QRCode(ref.current,{text:payload,width:size,height:size,colorDark:"#000",colorLight:"#fff",correctLevel:QRCode.CorrectLevel.M});
      setTimeout(()=>{
        const c=ref.current&&ref.current.querySelector("canvas");
        if(!c) return;
        const ctx=c.getContext("2d");
        const cx=size/2,cy=size/2,r=Math.round(size*0.1);
        ctx.beginPath();ctx.arc(cx,cy,r+4,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
        ctx.beginPath();ctx.arc(cx,cy,r+4,0,Math.PI*2);ctx.strokeStyle="#2B5CDB";ctx.lineWidth=3;ctx.stroke();
        ctx.font=`${Math.round(r*1.5)}px serif`;ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText("📱",cx,cy+1);
      },150);
    }catch(e){console.error(e);}
  },[payload,size]);
  return <div ref={ref} style={{borderRadius:8,lineHeight:0}}/>;
}

// ── Base Components ───────────────────────────────────────────
function Btn({onClick,disabled,style,children,variant="default"}){
  const base={border:"none",borderRadius:T.radiusSm,cursor:disabled?"not-allowed":"pointer",fontFamily:"'Prompt',sans-serif",fontWeight:600,fontSize:14,transition:"all 0.15s",opacity:disabled?0.5:1};
  const variants={
    default:{background:T.border,color:T.text,padding:"8px 16px"},
    primary:{background:T.accent,color:"#fff",padding:"10px 20px"},
    success:{background:T.green,color:"#fff",padding:"10px 20px"},
    danger:{background:T.red,color:"#fff",padding:"8px 16px"},
    ghost:{background:"transparent",color:T.textSub,border:`1.5px solid ${T.border}`,padding:"8px 16px"},
    warning:{background:T.yellow,color:"#fff",padding:"10px 20px"},
  };
  return <button onClick={disabled?undefined:onClick} style={{...base,...variants[variant],...style}}>{children}</button>;
}
function Card({children,style}){
  return <div style={{background:T.card,borderRadius:T.radiusLg,border:`1px solid ${T.border}`,boxShadow:T.shadow,...style}}>{children}</div>;
}
function Modal({onClose,children,width=360}){
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.card,borderRadius:T.radiusLg,padding:24,width:"100%",maxWidth:width,boxShadow:T.shadowLg,border:`1px solid ${T.border}`,maxHeight:"90vh",overflowY:"auto"}}>
        {children}
      </div>
    </div>
  );
}

// ── Stock Alert Badge ─────────────────────────────────────────
function StockBadge({stock,alert}){
  if(stock<=0) return <span style={{fontSize:9,background:T.redLight,color:T.red,borderRadius:4,padding:"1px 5px",fontWeight:700}}>หมด</span>;
  if(stock<=alert) return <span style={{fontSize:9,background:T.redLight,color:T.red,borderRadius:4,padding:"1px 5px",animation:"pulse-red 1.5s infinite"}}>⚠️ เหลือ {stock}</span>;
  if(stock<=alert*2) return <span style={{fontSize:9,background:T.yellowLight,color:T.yellow,borderRadius:4,padding:"1px 5px"}}>เหลือ {stock}</span>;
  return null;
}

// ── Weight/Price Input Modal ──────────────────────────────────
function InputModal({product,discountPct,onAdd,onClose}){
  const [mode,setMode]=useState("weight");
  const [val,setVal]=useState("");

  const rawPrice = mode==="weight"
    ? Math.round(parseFloat(val||0)*product.price*100)/100
    : parseFloat(val||0);
  const weight = mode==="weight"
    ? parseFloat(val||0)
    : parseFloat(val||0)/product.price;
  const finalPrice = discountPct>0 ? Math.round(rawPrice*(1-discountPct/100)*10)/10 : rawPrice;

  const press=(k)=>{
    if(k==="⌫"){setVal(v=>v.slice(0,-1));return;}
    if(k==="."&&val.includes(".")) return;
    if((val.split(".")[1]||"").length>=3) return;
    setVal(v=>v==="0"?k:v+k);
  };
  const canAdd=val&&finalPrice>0;

  return(
    <Modal onClose={onClose} width={320}>
      <div style={{textAlign:"center",marginBottom:16}}>
        <div style={{fontSize:52}}>{product.emoji}</div>
        <div style={{fontFamily:"'Prompt',sans-serif",fontWeight:700,fontSize:18,color:T.text}}>{product.name}</div>
        <div style={{fontSize:13,color:T.textSub}}>฿{product.price}/{product.unit}
          {discountPct>0&&<span style={{marginLeft:6,background:T.redLight,color:T.red,borderRadius:4,padding:"1px 6px",fontSize:11,fontWeight:700}}>ลด {discountPct}%</span>}
        </div>
      </div>
      {product.byWeight&&(
        <div style={{display:"flex",background:T.bg,borderRadius:T.radiusSm,padding:4,marginBottom:14,gap:4}}>
          {[{v:"weight",lbl:"⚖️ ใส่น้ำหนัก"},{v:"price",lbl:"💵 ใส่ราคา"}].map(m=>(
            <button key={m.v} onClick={()=>{setMode(m.v);setVal("");}}
              style={{flex:1,padding:"7px 0",borderRadius:6,border:"none",cursor:"pointer",fontFamily:"'Prompt',sans-serif",fontWeight:600,fontSize:13,background:mode===m.v?T.accent:"transparent",color:mode===m.v?"#fff":T.textSub,transition:"all 0.15s"}}>
              {m.lbl}
            </button>
          ))}
        </div>
      )}
      <div style={{background:T.bg,borderRadius:T.radiusSm,padding:"12px 16px",marginBottom:14,textAlign:"center",border:`1px solid ${T.border}`}}>
        <div style={{fontSize:12,color:T.textMuted,marginBottom:4}}>{mode==="weight"?"น้ำหนัก (กก.)":"ราคา (บาท)"}</div>
        <div style={{fontFamily:"'Prompt',sans-serif",fontSize:36,fontWeight:800,color:T.accent,minHeight:44,letterSpacing:2}}>{val||"0"}</div>
        <div style={{fontSize:14,color:T.green,fontWeight:700}}>
          {mode==="weight"
            ? discountPct>0
              ? <><span style={{textDecoration:"line-through",color:T.textMuted,fontSize:12}}>฿{fmt(rawPrice)}</span> <span>= ฿{fmt(finalPrice)}</span></>
              : `= ฿${fmt(finalPrice)}`
            : `= ${weight.toFixed(3)} กก.`}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
        {["1","2","3","4","5","6","7","8","9",".","0","⌫"].map(k=>(
          <button key={k} onClick={()=>press(k)}
            style={{padding:"13px 0",borderRadius:T.radiusSm,border:`1px solid ${T.border}`,background:k==="⌫"?T.redLight:T.surface,color:k==="⌫"?T.red:T.text,fontSize:20,fontWeight:700,cursor:"pointer",fontFamily:"'Prompt',sans-serif",boxShadow:T.shadow}}>
            {k}
          </button>
        ))}
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn onClick={onClose} variant="ghost" style={{flex:1}}>ยกเลิก</Btn>
        <Btn onClick={()=>{if(canAdd){onAdd(product,parseFloat(weight.toFixed(3)),finalPrice);onClose();}}} disabled={!canAdd} variant="primary" style={{flex:2}}>
          ✅ เพิ่มลงตะกร้า
        </Btn>
      </div>
    </Modal>
  );
}

// ── QR Payment Modal (PromptPay only, simplified) ─────────────
function QRPayModal({total,promptPayPhone,onConfirm,onClose}){
  const [confirmed,setConfirmed]=useState(false);
  const [speaking,setSpeaking]=useState(false);
  const payload=buildPromptPayQR(promptPayPhone,total);

  const speak=()=>{
    if("speechSynthesis" in window){
      setSpeaking(true);
      const u=new SpeechSynthesisUtterance(`รับเงิน ${Math.round(total)} บาท`);
      u.lang="th-TH";u.rate=0.9;u.onend=()=>setSpeaking(false);
      window.speechSynthesis.speak(u);
    }
  };
  const handleConfirm=()=>{
    setConfirmed(true);speak();
    setTimeout(()=>onConfirm(),1200);
  };

  return(
    <Modal onClose={onClose} width={340}>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"'Prompt',sans-serif",fontWeight:700,fontSize:18,marginBottom:4}}>📱 พร้อมเพย์</div>
        <div style={{fontFamily:"'Prompt',sans-serif",fontSize:34,fontWeight:800,color:T.accent,marginBottom:4}}>฿{fmt(total)}</div>
        <div style={{fontSize:12,color:T.textMuted,marginBottom:14}}>สแกน QR เพื่อชำระเงิน</div>
        <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
          <div style={{border:`3px solid #2B5CDB`,borderRadius:12,padding:8,background:"#fff"}}>
            <QRCanvas payload={payload} size={200}/>
          </div>
        </div>
        <div style={{background:T.blueLight,borderRadius:T.radiusSm,padding:"8px 14px",marginBottom:16,fontSize:13,color:T.blue}}>
          📞 <strong>{promptPayPhone}</strong>
        </div>
        {confirmed
          ? <div style={{background:T.greenLight,borderRadius:T.radiusSm,padding:14,color:T.green,fontWeight:700,fontSize:16}}>✅ รับเงินแล้ว {speaking&&"🔊"}</div>
          : <div style={{display:"flex",gap:8,flexDirection:"column"}}>
              <Btn onClick={handleConfirm} variant="success" style={{width:"100%",padding:"13px 0",fontSize:15}}>✅ รับเงินแล้ว / ยืนยัน</Btn>
              <Btn onClick={onClose} variant="ghost" style={{width:"100%"}}>❌ ยกเลิก</Btn>
            </div>
        }
      </div>
    </Modal>
  );
}

// ── Close Shift Modal (ปิดกะ) ─────────────────────────────────
function CloseShiftModal({sales,sellerName,onClose}){
  const today=todayKey();
  const todaySales=sales[today]||[];
  const sellerSales=sellerName?todaySales.filter(o=>o.sellerName===sellerName):todaySales;
  const total=sellerSales.reduce((s,o)=>s+o.total,0);
  const cashTotal=sellerSales.filter(o=>o.method==="cash").reduce((s,o)=>s+o.total,0);
  const qrTotal=sellerSales.filter(o=>o.method==="qr").reduce((s,o)=>s+o.total,0);
  const billCount=sellerSales.length;
  const avgBill=billCount?total/billCount:0;
  const now=new Date().toLocaleTimeString("th-TH");

  const handlePrint=()=>{
    const w=window.open("","_blank","width=350,height=500");
    w.document.write(`<html><head><meta charset="UTF-8">
    <style>body{font-family:'Sarabun',sans-serif;padding:20px;max-width:300px;margin:0 auto}.title{text-align:center;font-size:18px;font-weight:bold}.sub{text-align:center;font-size:12px;color:#666}.line{border-top:1px dashed #999;margin:8px 0}.row{display:flex;justify-content:space-between;font-size:14px;margin:5px 0}.big{font-size:20px;font-weight:bold}.footer{text-align:center;font-size:11px;color:#888;margin-top:12px}</style>
    </head><body>
    <div class="title">🍊 ร้านผลไม้</div>
    <div class="sub">สรุปยอดปิดร้าน</div>
    <div class="sub">${thaiDate(today)} | ปิดเวลา ${now}</div>
    ${sellerName?`<div class="sub">ผู้ขาย: ${sellerName}</div>`:""}
    <div class="line"></div>
    <div class="row"><span>จำนวนบิล</span><span>${billCount} บิล</span></div>
    <div class="row"><span>💵 เงินสด</span><span>฿${fmt(cashTotal)}</span></div>
    <div class="row"><span>📱 พร้อมเพย์</span><span>฿${fmt(qrTotal)}</span></div>
    <div class="line"></div>
    <div class="row big"><span>รวมทั้งหมด</span><span>฿${fmt(total)}</span></div>
    <div class="row"><span>เฉลี่ย/บิล</span><span>฿${fmt(avgBill)}</span></div>
    <div class="footer">ขอบคุณที่ใช้บริการ 🙏</div>
    </body></html>`);
    w.document.close();
    setTimeout(()=>{w.print();w.close();},300);
  };

  return(
    <Modal onClose={onClose} width={360}>
      <div style={{textAlign:"center",marginBottom:16}}>
        <div style={{fontSize:44}}>🏁</div>
        <div style={{fontFamily:"'Prompt',sans-serif",fontWeight:700,fontSize:19,marginTop:4}}>สรุปยอดปิดร้าน</div>
        <div style={{fontSize:12,color:T.textMuted}}>{thaiDate(today)} · ปิดเวลา {now}</div>
        {sellerName&&<div style={{fontSize:13,color:T.textSub,marginTop:2}}>👤 {sellerName}</div>}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[
          {icon:"🧾",label:"จำนวนบิล",value:`${billCount} บิล`,color:T.blue,bg:T.blueLight},

// ── Mini Bar Chart ────────────────────────────────────────────
function MiniBarChart({data,height=80}){
  if(!data||data.length===0) return <div style={{textAlign:"center",color:T.textMuted,padding:20,fontSize:13}}>ยังไม่มีข้อมูล</div>;
  const max=Math.max(...data.map(d=>d.v),1);
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:4,height,paddingTop:8}}>

// ── Admin PIN changer ─────────────────────────────────────────
function AdminPinChanger({current,onChange}){
  const [oldPin,setOldPin]=useState("");
  const [newPin,setNewPin]=useState("");
  const [conf,setConf]=useState("");
  const [msg,setMsg]=useState(null);
  const save=()=>{
    if(oldPin!==current){setMsg({ok:false,text:"รหัสเก่าไม่ถูกต้อง"});return;}
    if(newPin.length<4){setMsg({ok:false,text:"รหัสใหม่ต้องมีอย่างน้อย 4 ตัว"});return;}
    if(newPin!==conf){setMsg({ok:false,text:"รหัสยืนยันไม่ตรงกัน"});return;}
    onChange(newPin);setOldPin("");setNewPin("");setConf("");
    setMsg({ok:true,text:"เปลี่ยนรหัสสำเร็จ ✅"});
  };
  const inp={border:`1.5px solid ${T.border}`,borderRadius:T.radiusSm,padding:"9px 12px",fontSize:14,outline:"none",background:T.bg,color:T.text,width:"100%",boxSizing:"border-box",marginBottom:10,fontFamily:"'Sarabun',sans-serif"};
  return(
    <div>
      <input type="password" placeholder="รหัสเก่า" value={oldPin} onChange={e=>setOldPin(e.target.value)} style={inp}/>
      <input type="password" placeholder="รหัสใหม่" value={newPin} onChange={e=>setNewPin(e.target.value)} style={inp}/>
      <input type="password" placeholder="ยืนยันรหัสใหม่" value={conf} onChange={e=>setConf(e.target.value)} style={{...inp,marginBottom:12}}/>
      {msg&&<div style={{fontSize:13,color:msg.ok?T.green:T.red,marginBottom:10}}>{msg.text}</div>}
      <Btn onClick={save} variant="primary" style={{width:"100%",padding:"10px 0"}}>บันทึกรหัสใหม่</Btn>
    </div>
  );
}

//  MAIN APP

function FruitPOS(){
  const [products,setProducts]=useState(()=>LS.get("pos_products_v3",INIT_PRODUCTS));
  const [sales,setSales]=useState(()=>LS.get("pos_sales",{}));
  const [settings,setSettings]=useState(()=>LS.get("pos_settings_v3",{adminPin:"1234",promptPayPhone:"0812345678",sellers:[],discountPct:0,discountActive:false,lowAlertDefault:3}));
  const [tab,setTab]=useState("pos");
  const [currentSeller,setCurrentSeller]=useState(null);
  const [cart,setCart]=useState([]);
  const [received,setReceived]=useState("");
  const [payMethod,setPayMethod]=useState("cash");
  const [inputModal,setInputModal]=useState(null);
  const [showQRModal,setShowQRModal]=useState(false);
  const [showReceipt,setShowReceipt]=useState(false);
  const [showCloseShift,setShowCloseShift]=useState(false);
  const [lastOrder,setLastOrder]=useState(null);
  const [adminPinInput,setAdminPinInput]=useState("");
  const [pinOk,setPinOk]=useState(false);
  const [editingId,setEditingId]=useState(null);
  const [newProd,setNewProd]=useState({name:"",emoji:"🍎",price:"",cost:"",unit:"กก.",stock:"",byWeight:true,lowAlert:3});
  const [showEmoji,setShowEmoji]=useState(false);
  const [reportDate,setReportDate]=useState(todayKey());
  const [showHistory,setShowHistory]=useState(false);
  const [historyDate,setHistoryDate]=useState(todayKey());
  const [adminSubTab,setAdminSubTab]=useState("products");
  const [newSellerInput,setNewSellerInput]=useState("");

  useEffect(()=>LS.set("pos_products_v3",products),[products]);
  useEffect(()=>LS.set("pos_sales",sales),[sales]);
  useEffect(()=>LS.set("pos_settings_v3",settings),[settings]);

  // ── สินค้าที่ใกล้หมด (global alert) ─────────────
  const lowStockItems=useMemo(()=>products.filter(p=>p.active&&p.stock>0&&p.stock<=(p.lowAlert||3)),[products]);
  const outOfStockItems=useMemo(()=>products.filter(p=>p.active&&p.stock<=0),[products]);

  const total=cart.reduce((s,i)=>s+i.lineTotal,0);
  const change=parseFloat(received||0)-total;
  const activeProducts=products.filter(p=>p.active);
  const allDates=Object.keys(sales).sort().reverse();

  // ── กดสินค้า ─────────────────────────────────────
  const handleClick=(p)=>{
    if(p.stock<=0) return;
    if(p.byWeight) setInputModal(p);
    else addCount(p);
  };

  const addCount=(p)=>{
    const discPct=settings.discountActive?settings.discountPct:0;
    const unitPrice=discPct>0?Math.round(p.price*(1-discPct/100)*10)/10:p.price;
    setCart(prev=>{
      const ex=prev.find(i=>i.id===p.id&&!i.byWeight);
      if(ex) return prev.map(i=>i.id===p.id&&!i.byWeight?{...i,qty:i.qty+1,lineTotal:Math.round((i.lineTotal+unitPrice)*100)/100}:i);
      return [...prev,{...p,qty:1,lineTotal:unitPrice,byWeight:false,discountPct:discPct,cartKey:Date.now()+Math.random()}];
    });
  };

  const addWeight=(p,weight,lineTotal)=>
    setCart(prev=>[...prev,{...p,weight,qty:1,lineTotal,byWeight:true,discountPct:settings.discountActive?settings.discountPct:0,cartKey:Date.now()+Math.random()}]);

  const removeItem=(cartKey)=>setCart(prev=>prev.filter(i=>i.cartKey!==cartKey));
  const clearCart=()=>{setCart([]);setReceived("");};

  // ── ชำระเงิน + ลดสต็อกอัตโนมัติ ─────────────────
  const completeCheckout=(method)=>{
    if(!cart.length) return;
    const order={
      id:Date.now(),items:[...cart],total,
      received:method==="cash"?parseFloat(received):total,
      change:method==="cash"?change:0,
      method,time:thaiTime(),date:todayKey(),sellerName:currentSeller||"",
    };
    // บันทึกการขาย
    setSales(prev=>{const k=todayKey();return{...prev,[k]:[...(prev[k]||[]),order]};});
    // ลดสต็อกอัตโนมัติ
    setProducts(prev=>prev.map(p=>{
      const sold=cart.filter(i=>i.id===p.id);
      if(!sold.length) return p;
      const totalUsed=sold.reduce((s,i)=>s+(i.byWeight?i.weight:i.qty),0);
      return{...p,stock:Math.max(0,Math.round((p.stock-totalUsed)*1000)/1000)};
    }));
    setLastOrder(order);
    setCart([]);setReceived("");
    setShowQRModal(false);setShowReceipt(true);
  };

  const handleCashCheckout=()=>{if(!cart.length||change<0||!received) return; completeCheckout("cash");};

  // ── ลบ/จัดการข้อมูล ──────────────────────────────
  const deleteOrder=(date,orderId)=>{
    setSales(prev=>{
      const u={...prev};
      u[date]=(u[date]||[]).filter(o=>o.id!==orderId);
      if(u[date].length===0) delete u[date];
      return{...u};
    });
  };

  const addProd=()=>{
    if(!newProd.name||!newProd.price) return;
    setProducts(prev=>[...prev,{...newProd,id:Date.now(),price:+newProd.price,cost:+newProd.cost||0,stock:+newProd.stock||0,active:true,lowAlert:+newProd.lowAlert||3}]);
    setNewProd({name:"",emoji:"🍎",price:"",cost:"",unit:"กก.",stock:"",byWeight:true,lowAlert:3});
  };

  const deleteProduct=(id)=>{if(window.confirm("ลบสินค้านี้?")) setProducts(prev=>prev.filter(x=>x.id!==id));};
  const deleteSeller=(s)=>setSettings(prev=>({...prev,sellers:prev.sellers.filter(x=>x!==s)}));

  // ── รายงาน ───────────────────────────────────────
  const rSales=sales[reportDate]||[];
  const rTotal=rSales.reduce((s,o)=>s+o.total,0);
  const rCost=rSales.reduce((s,o)=>s+o.items.reduce((ss,item)=>{
    const prod=products.find(p=>p.id===item.id);
    const cost=(prod?.cost||0)*(item.byWeight?item.weight:item.qty);
    return ss+cost;
  },0),0);
  const rProfit=rTotal-rCost;
  const cashO=rSales.filter(o=>o.method==="cash");
  const qrO=rSales.filter(o=>o.method==="qr");
  const cashT=cashO.reduce((s,o)=>s+o.total,0);
  const qrT=qrO.reduce((s,o)=>s+o.total,0);

  const topItems=()=>{
    const m={};
    rSales.forEach(o=>o.items.forEach(i=>{m[i.name]=(m[i.name]||0)+(i.byWeight?i.weight:i.qty);}));
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,5);
  };

  // กราฟยอดขาย 7 วันล่าสุด
  const last7=useMemo(()=>{
    const days=[];
    for(let i=6;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const k=d.toISOString().slice(0,10);
      const label=i===0?"วันนี้":i===1?"เมื่อวาน":`${d.getDate()}/${d.getMonth()+1}`;
      const v=(sales[k]||[]).reduce((s,o)=>s+o.total,0);
      days.push({k,label,v});
    }
    return days;
  },[sales]);

  const downloadCSV=(range="day")=>{
    let rows=[["วันที่","เวลา","บิล#","ผู้ขาย","สินค้า","น้ำหนัก/จำนวน","ราคา","ต้นทุน","วิธีชำระ","ยอดรวม"]];
    const dates=range==="day"?[reportDate]:allDates;
    dates.forEach(d=>{
      (sales[d]||[]).forEach(o=>{
        o.items.forEach(item=>{
          const prod=products.find(p=>p.id===item.id);
          const cost=(prod?.cost||0)*(item.byWeight?item.weight:item.qty);
          rows.push([d,o.time,o.id,o.sellerName||"",item.name,
            item.byWeight?`${item.weight}กก.`:`${item.qty}ชิ้น`,
            item.lineTotal.toFixed(2),cost.toFixed(2),
            o.method==="cash"?"เงินสด":"พร้อมเพย์",o.total.toFixed(2)]);
        });
      });
    });
    const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.style.display="none";a.href=url;
    a.download=`sales_${range==="day"?reportDate:"all"}_${Date.now()}.csv`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},300);
  };

  if(!currentSeller){
    return <SellerLogin sellers={settings.sellers} onLogin={name=>{
      if(!settings.sellers.includes(name)) setSettings(s=>({...s,sellers:[...s.sellers,name]}));
      setCurrentSeller(name);
    }}/>;
  }

  return(
    <div style={{display:"flex",height:"100vh",background:T.bg,fontFamily:"'Sarabun',sans-serif",overflow:"hidden"}}>

      {/* ── Modals ─── */}
      {inputModal&&<InputModal product={inputModal} discountPct={settings.discountActive?settings.discountPct:0} onAdd={addWeight} onClose={()=>setInputModal(null)}/>}
      {showQRModal&&<QRPayModal total={total} promptPayPhone={settings.promptPayPhone} onConfirm={()=>completeCheckout("qr")} onClose={()=>setShowQRModal(false)}/>}
      {showReceipt&&lastOrder&&<ReceiptModal order={lastOrder} onClose={()=>setShowReceipt(false)}/>}
      {showCloseShift&&<CloseShiftModal sales={sales} sellerName={currentSeller} onClose={()=>setShowCloseShift(false)}/>}

      {/* ── ประวัติ Modal ─── */}
      {showHistory&&(
        <Modal onClose={()=>setShowHistory(false)} width={480}>
          <div style={{fontFamily:"'Prompt',sans-serif",fontWeight:700,fontSize:17,marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>📋 ประวัติการขาย</span>
            <select value={historyDate} onChange={e=>setHistoryDate(e.target.value)}
              style={{border:`1px solid ${T.border}`,borderRadius:T.radiusSm,padding:"5px 8px",fontSize:13,outline:"none",background:T.bg,color:T.text}}>
              {allDates.length===0&&<option value={todayKey()}>วันนี้</option>}
              {allDates.map(d=><option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          {(sales[historyDate]||[]).length===0
            ?<div style={{textAlign:"center",color:T.textMuted,padding:24}}>ยังไม่มีการขาย</div>
            :<div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[...(sales[historyDate]||[])].reverse().map(o=>(
                <div key={o.id} style={{background:T.bg,borderRadius:T.radiusSm,padding:"12px 14px",border:`1px solid ${T.border}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div>
                      <span style={{fontWeight:700,color:T.text}}>{o.time}</span>
                      {o.sellerName&&<span style={{fontSize:12,color:T.textMuted,marginLeft:8}}>· {o.sellerName}</span>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontWeight:700,color:T.accent}}>฿{fmt(o.total)}</span>
                      <button onClick={()=>{if(window.confirm("ลบรายการนี้?")) deleteOrder(historyDate,o.id);}}
                        style={{background:T.redLight,border:"none",borderRadius:6,color:T.red,cursor:"pointer",padding:"3px 8px",fontSize:12}}>🗑️</button>
                    </div>
                  </div>
                  <div style={{fontSize:12,color:T.textSub}}>{o.method==="cash"?"💵 เงินสด":"📱 พร้อมเพย์"} · {o.items.length} รายการ</div>
                  <div style={{fontSize:12,color:T.textMuted,marginTop:3}}>{o.items.map(i=>`${i.emoji}${i.name}`).join(", ")}</div>
                </div>
              ))}
            </div>
          }
          <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${T.border}`,display:"flex",gap:8}}>
            <Btn onClick={()=>{if(window.confirm(`ลบประวัติทั้งหมดของ ${historyDate}?`)) setSales(p=>{const n={...p};delete n[historyDate];return n;});}} variant="danger" style={{flex:1,fontSize:13}}>🗑️ ลบวันนี้</Btn>
            <Btn onClick={()=>{if(window.confirm("ลบประวัติทั้งหมด?")) setSales({});}} variant="ghost" style={{flex:1,fontSize:13,color:T.red,borderColor:T.red}}>⚠️ ลบทั้งหมด</Btn>
          </div>
        </Modal>
      )}

      {/* ── Sidebar ─── */}

                            ))}
                          </div>
                        </div>
                      </div>
                      {settings.discountActive&&(
                        <div style={{marginTop:12,background:T.redLight,borderRadius:T.radiusSm,padding:"8px 12px",fontSize:13,color:T.red,fontWeight:600}}>
                          🔥 กำลังลดราคาทุกสินค้า {settings.discountPct}% อยู่
                        </div>
                      )}
                    </Card>

                    {/* พร้อมเพย์ */}
                    <Card style={{padding:20}}>
                      <div style={{fontWeight:700,marginBottom:14,fontSize:15}}>📱 เบอร์พร้อมเพย์</div>
                      <div style={{fontSize:12,color:T.textMuted,marginBottom:6}}>เบอร์โทรศัพท์ที่ลงทะเบียนพร้อมเพย์</div>
                      <PhoneEditor value={settings.promptPayPhone} onChange={v=>setSettings(s=>({...s,promptPayPhone:v}))}/>
                    </Card>

                    {/* รหัส Admin */}
                    <Card style={{padding:20}}>
                      <div style={{fontWeight:700,marginBottom:14,fontSize:15}}>🔐 เปลี่ยนรหัส Admin</div>
                      <AdminPinChanger current={settings.adminPin} onChange={pin=>setSettings(s=>({...s,adminPin:pin}))}/>
                    </Card>

                    {/* ผู้ขาย */}
                    <Card style={{padding:20}}>
                      <div style={{fontWeight:700,marginBottom:14,fontSize:15}}>👥 รายชื่อผู้ขาย</div>
                      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
                        {settings.sellers.map(s=>(
                          <div key={s} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:T.bg,borderRadius:T.radiusSm,padding:"8px 12px",border:`1px solid ${T.border}`}}>
                            <span>👤 {s}</span>
                            <button onClick={()=>deleteSeller(s)} style={{background:T.redLight,border:"none",borderRadius:6,color:T.red,cursor:"pointer",padding:"3px 8px",fontSize:12}}>ลบ</button>
                          </div>
                        ))}
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <input value={newSellerInput} onChange={e=>setNewSellerInput(e.target.value)} placeholder="ชื่อผู้ขายใหม่"
                          style={{flex:1,border:`1.5px solid ${T.border}`,borderRadius:T.radiusSm,padding:"8px 12px",fontSize:14,outline:"none",background:T.bg,color:T.text}}/>
                        <Btn onClick={()=>{if(newSellerInput.trim()){setSettings(s=>({...s,sellers:[...s.sellers,newSellerInput.trim()]}));setNewSellerInput("");}}} variant="primary">เพิ่ม</Btn>
                      </div>
                    </Card>
                  </div>
                )}
              </>
            )}
          </div>
        )}

        {/* ════ REPORT TAB ════ */}
        {tab==="report"&&(
          <div style={{flex:1,padding:20,overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
              <div style={{fontFamily:"'Prompt',sans-serif",fontSize:18,fontWeight:700,color:T.text}}>📊 รายงานยอดขาย</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <select value={reportDate} onChange={e=>setReportDate(e.target.value)}
                  style={{border:`1px solid ${T.border}`,borderRadius:T.radiusSm,padding:"7px 10px",fontSize:13,outline:"none",background:T.bg,color:T.text}}>
                  <option value={todayKey()}>วันนี้</option>
                  {allDates.filter(d=>d!==todayKey()).map(d=><option key={d} value={d}>{d}</option>)}
                </select>
                <Btn onClick={()=>downloadCSV("day")} variant="ghost" style={{fontSize:12}}>⬇️ CSV วันนี้</Btn>
                <Btn onClick={()=>downloadCSV("all")} variant="ghost" style={{fontSize:12}}>⬇️ CSV ทั้งหมด</Btn>
                <Btn onClick={()=>setShowHistory(true)} variant="ghost" style={{fontSize:12}}>📋 ประวัติ</Btn>
              </div>
            </div>

            {/* Stats */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
              {[
                {label:"ยอดขายรวม",value:`฿${fmt(rTotal)}`,icon:"💰",color:T.accent,bg:T.accentLight},
                {label:"กำไรรวม",value:`฿${fmt(rProfit)}`,icon:"📈",color:T.green,bg:T.greenLight},
                {label:"จำนวนบิล",value:`${rSales.length} บิล`,icon:"🧾",color:T.blue,bg:T.blueLight},
                {label:"เฉลี่ย/บิล",value:`฿${fmt(rSales.length?rTotal/rSales.length:0)}`,icon:"💹",color:T.purple,bg:T.purpleLight},
              ].map(c=>(
                <Card key={c.label} style={{padding:"12px 14px",background:c.bg,borderColor:"transparent"}}>
                  <div style={{fontSize:22,marginBottom:2}}>{c.icon}</div>
                  <div style={{fontFamily:"'Prompt',sans-serif",fontSize:16,fontWeight:800,color:c.color}}>{c.value}</div>
                  <div style={{fontSize:10,color:T.textMuted}}>{c.label}</div>
                </Card>
              ))}
            </div>

            {/* กราฟ 7 วัน */}
            <Card style={{padding:16,marginBottom:14}}>
              <div style={{fontWeight:700,marginBottom:8,fontSize:14}}>📅 ยอดขาย 7 วันล่าสุด</div>
              <MiniBarChart data={last7} height={90}/>
            </Card>

            {/* Cash vs QR */}
            <Card style={{padding:16,marginBottom:14}}>
              <div style={{fontWeight:700,marginBottom:12,fontSize:14}}>💳 แยกยอดตามวิธีชำระ</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                {[
                  {lbl:"เงินสด",icon:"💵",color:T.green,bg:T.greenLight,orders:cashO,total:cashT},
                  {lbl:"พร้อมเพย์",icon:"📱",color:T.blue,bg:T.blueLight,orders:qrO,total:qrT},
                ].map((m,i)=>(
                  <div key={i} style={{background:m.bg,borderRadius:T.radiusSm,padding:14}}>
                    <div style={{fontSize:28}}>{m.icon}</div>
                    <div style={{fontFamily:"'Prompt',sans-serif",fontSize:20,fontWeight:800,color:m.color}}>฿{fmt(m.total)}</div>
                    <div style={{fontSize:12,color:T.textSub}}>{m.lbl} · {m.orders.length} บิล</div>
                    {rTotal>0&&<>
                      <div style={{height:4,background:"#fff",borderRadius:3,overflow:"hidden",marginTop:8}}>
                        <div style={{height:"100%",width:`${((m.total/rTotal)*100).toFixed(1)}%`,background:m.color,borderRadius:3}}/>
                      </div>
                      <div style={{fontSize:10,color:T.textMuted,marginTop:2}}>{((m.total/rTotal)*100).toFixed(1)}%</div>
                    </>}
                  </div>
                ))}
              </div>
            </Card>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              {/* สินค้าขายดี */}
              <Card style={{padding:14}}>
                <div style={{fontWeight:700,marginBottom:10,fontSize:13}}>🏆 สินค้าขายดี</div>
                {topItems().length===0
                  ?<div style={{color:T.textMuted,fontSize:13}}>ยังไม่มีข้อมูล</div>
                  :topItems().map(([name,qty],i)=>(
                    <div key={name} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:i<topItems().length-1?`1px solid ${T.border}`:"none"}}>
                      <span style={{fontSize:12}}>{["🥇","🥈","🥉","4️⃣","5️⃣"][i]} {name}</span>
                      <span style={{fontWeight:700,color:T.accent,fontSize:12}}>{typeof qty==="number"&&qty%1!==0?qty.toFixed(2)+" กก.":`${qty} ชิ้น`}</span>
                    </div>
                  ))
                }
              </Card>

              {/* บิลล่าสุด */}
              <Card style={{padding:14}}>
                <div style={{fontWeight:700,marginBottom:10,fontSize:13}}>🕐 บิลล่าสุด</div>
                {rSales.length===0
                  ?<div style={{color:T.textMuted,fontSize:13}}>ยังไม่มีการขาย</div>
                  :[...rSales].reverse().slice(0,7).map(o=>(
                    <div key={o.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${T.border}`}}>
                      <div>
                        <div style={{fontSize:12}}>{o.time}</div>
                        <div style={{fontSize:10,color:T.textMuted}}>{o.method==="cash"?"💵":"📱"} {o.sellerName||""}</div>
                      </div>
                      <span style={{fontWeight:700,color:T.accent,fontSize:13}}>฿{fmt(o.total)}</span>
                    </div>
                  ))
                }
              </Card>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Phone Editor ──────────────────────────────────────────────
function PhoneEditor({value,onChange}){
  const [v,setV]=useState(value);
  const [saved,setSaved]=useState(false);
  const save=()=>{onChange(v);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  return(
    <div style={{display:"flex",gap:8}}>
      <input value={v} onChange={e=>setV(e.target.value)} placeholder="0812345678"
        style={{flex:1,border:`1.5px solid ${T.border}`,borderRadius:T.radiusSm,padding:"9px 12px",fontSize:14,outline:"none",background:T.bg,color:T.text}}/>
      <Btn onClick={save} variant={saved?"success":"primary"}>{saved?"✅":"บันทึก"}</Btn>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<FruitPOS/>);
</script>
</body>
</html>
