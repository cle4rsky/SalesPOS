// ══ Helpers (timezone-aware: Asia/Bangkok) ══════
const TZ = "Asia/Bangkok";

// วันที่ key YYYY-MM-DD ตาม timezone ไทย
const todayKey = () => {
  const now = new Date();
  const opts = { timeZone: TZ, year: "numeric", month: "2-digit", day: "2-digit" };
  const parts = new Intl.DateTimeFormat("en-CA", opts).formatToParts(now);
  // en-CA gives YYYY-MM-DD naturally
  return parts.map(p => p.value).join(""); // "2025-07-15"
};

// เดือน key YYYY-MM
const monthKey = (d) => {
  if (d) return String(d).slice(0, 7);
  const now = new Date();
  const opts = { timeZone: TZ, year: "numeric", month: "2-digit" };
  const parts = new Intl.DateTimeFormat("en-CA", opts).formatToParts(now);
  // returns YYYY-MM
  return parts.filter(p => p.type !== "literal").map(p => p.value).join("-").slice(0, 7);
};

// ══ Firebase Sync ══════════════════════════════
function useFirebaseData(path, defaultVal) {
  const [data, setData] = useState(defaultVal);
  const [ready, setReady] = useState(!FIREBASE_READY || !db);
  useEffect(() => {
    if (!db) { setData(LS.get(path, defaultVal)); setReady(true); return; }
    const ref = db.ref(path);
    ref.on('value', snap => { const val = snap.val(); setData(val !== null ? val : defaultVal); setReady(true); });
    return () => ref.off();
  }, [path]);
  const setFirebase = useCallback((updater) => {
    setData(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      if (db) db.ref(path).set(next); else LS.set(path, next);
      return next;
    });
  }, [path]);
  return [data, setFirebase, ready];
}

// ══ PromptPay QR ════════════════════════════════
function crc16(str){
  let crc=0xFFFF;
  for(let i=0;i<str.length;i++){crc^=str.charCodeAt(i)<<8;for(let j=0;j<8;j++)crc=(crc&0x8000)?((crc<<1)^0x1021)&0xFFFF:(crc<<1)&0xFFFF;}
  return crc.toString(16).toUpperCase().padStart(4,"0");
}
function tlv(tag,value){return tag+String(value.length).padStart(2,"0")+value;}
function buildPromptPayQR(phone,amount){
  const d=phone.replace(/\D/g,"");
  const norm=d.startsWith("0")&&d.length===10?"0066"+d.slice(1):d;
  const merchant=tlv("29",tlv("00","A000000677010111")+tlv("01",norm));
  let p=tlv("00","01")+tlv("01","12")+merchant+tlv("53","764");
  if(amount>0) p+=tlv("54",amount.toFixed(2));
  p+=tlv("58","TH")+"6304";
  return p+crc16(p);
}

function QRCanvas({payload,size=200}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!payload) return;
    ref.current.innerHTML="";
    try{
      new QRCode(ref.current,{text:payload,width:size,height:size,colorDark:"#000",colorLight:"#fff",correctLevel:QRCode.CorrectLevel.M});
      setTimeout(()=>{
        const c=ref.current&&ref.current.querySelector("canvas");
        if(!c) return;
        const ctx=c.getContext("2d");
        const cx=size/2,cy=size/2,r=Math.round(size*0.1);
        ctx.beginPath();ctx.arc(cx,cy,r+4,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
        ctx.beginPath();ctx.arc(cx,cy,r+4,0,Math.PI*2);ctx.strokeStyle="#2B5CDB";ctx.lineWidth=3;ctx.stroke();
        ctx.font=`${Math.round(r*1.5)}px serif`;ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText("📱",cx,cy+1);
      },150);
    }catch(e){console.error(e);}
  },[payload,size]);
  return <div ref={ref} style={{borderRadius:8,lineHeight:0}}/>;
}

// ══ ImageUploader ════════════════════════════════
function ImageUploader({value, onChange, size=52}) {
  const inputRef = useRef(null);
  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 2*1024*1024) { alert("รูปใหญ่เกิน 2MB กรุณาเลือกรูปใหม่"); return; }
    const reader = new FileReader();
    reader.onload = (ev) => onChange(ev.target.result);
    reader.readAsDataURL(file);
  };
  return (
    <div className="img-upload-area" style={{width:size,height:size}} onClick={()=>inputRef.current&&inputRef.current.click()}>
      {value
        ? <img src={value} alt="product" style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:8}}/>
        : <span style={{fontSize:20,opacity:0.4}}>📷</span>
      }
      <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
    </div>
  );
}

// ══ QR Auto-Verify Modal ═════════════════════════
function QRPayModal({total,promptPayPhone,onConfirm,onClose,orderId}){
  const [status,setStatus]=useState("waiting");
  const [elapsed,setElapsed]=useState(0);
  const timerRef=useRef(null);
  const pollRef=useRef(null);
  const confettiColors=["#F97316","#22C55E","#3B82F6","#EAB308","#8B5CF6"];
  const payload=buildPromptPayQR(promptPayPhone,total);

  const speakThai=(text)=>{
    if("speechSynthesis" in window){
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.lang="th-TH"; u.rate=0.85; u.pitch=1.1; u.volume=1;
      const voices=window.speechSynthesis.getVoices();
      const thVoice=voices.find(v=>v.lang==="th-TH"||v.lang.startsWith("th"));
      if(thVoice) u.voice=thVoice;
      window.speechSynthesis.speak(u);
    }
  };

  const handleConfirmed=()=>{
    setStatus("confirmed");
    clearInterval(pollRef.current);
    clearInterval(timerRef.current);
    const amount=Math.round(total);
    speakThai(`รับเงินสำเร็จ ${amount} บาท ขอบคุณครับ`);
    setTimeout(()=>onConfirm(), 2200);
  };

  const handleManualConfirm=()=>{
    if(db&&orderId) db.ref(`qr_confirms/${orderId}`).set(true);
    handleConfirmed();
  };

  useEffect(()=>{
    if("speechSynthesis" in window) window.speechSynthesis.getVoices();
    timerRef.current=setInterval(()=>setElapsed(e=>e+1),1000);
    if(db && orderId){
      pollRef.current=setInterval(()=>{
        db.ref(`qr_confirms/${orderId}`).once('value').then(snap=>{
          if(snap.val()===true && status!=="confirmed") handleConfirmed();
        });
      },3000);
    }
    return ()=>{ clearInterval(timerRef.current); clearInterval(pollRef.current); };
  },[]);

  return(
    <Modal onClose={status==="confirmed"?undefined:onClose} width={360}>
      <div style={{textAlign:"center",position:"relative",overflow:"hidden"}}>
        {status==="confirmed"&&[...Array(12)].map((_,i)=>(
          <div key={i} className="confetti-dot" style={{left:`${8+i*7}%`,top:"10%",background:confettiColors[i%confettiColors.length],animationDelay:`${i*0.08}s`,transform:`rotate(${i*30}deg)`}}/>
        ))}
        {status==="confirmed"?(
          <div className="qr-success" style={{padding:"20px 0"}}>
            <div style={{fontSize:72,marginBottom:8}}>✅</div>
            <div style={{fontFamily:"'Prompt',sans-serif",fontWeight:800,fontSize:22,color:T.green,marginBottom:4}}>รับเงินสำเร็จ!</div>
            <div style={{fontFamily:"'Prompt',sans-serif",fontSize:32,fontWeight:800,color:T.accent,marginBottom:8}}>฿{fmt(total)}</div>
            <div style={{fontSize:13,color:T.textMuted}}>กำลังพิมพ์ใบเสร็จ...</div>
          </div>
        ):(
          <>
            <div style={{fontFamily:"'Prompt',sans-serif",fontWeight:700,fontSize:18,marginBottom:4}}>📱 สแกนพร้อมเพย์</div>
            <div style={{fontFamily:"'Prompt',sans-serif",fontSize:34,fontWeight:800,color:T.accent,marginBottom:4}}>฿{fmt(total)}</div>
            <div style={{fontSize:12,color:T.textMuted,marginBottom:14}}>สแกน QR Code เพื่อชำระเงิน</div>
            <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
              <div style={{border:`3px solid #2B5CDB`,borderRadius:14,padding:10,background:"#fff",boxShadow:T.shadowMd}}>
                <QRCanvas payload={payload} size={190}/>
              </div>
            </div>
            <div style={{background:T.blueLight,borderRadius:T.radiusSm,padding:"8px 14px",marginBottom:10,fontSize:13,color:T.blue}}>
              📞 <strong>{promptPayPhone}</strong>
            </div>
            {db&&orderId?(
              <div style={{background:T.yellowLight,borderRadius:T.radiusSm,padding:"8px 12px",marginBottom:14,fontSize:12,color:"#92400E",display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}>
                <span style={{display:"inline-block",width:10,height:10,border:"2px solid",borderColor:`#B45309 transparent`,borderRadius:"50%",animation:"spin 0.8s linear infinite",flexShrink:0}}/>
                <span>กำลังรอการยืนยันอัตโนมัติ... <strong>{elapsed}s</strong></span>
              </div>
            ):(
              <div style={{background:T.yellowLight,borderRadius:T.radiusSm,padding:"7px 12px",marginBottom:12,fontSize:11,color:"#92400E"}}>
                💡 เชื่อมต่อ Firebase เพื่อเปิดระบบ Auto-verify
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={handleManualConfirm}
                style={{width:"100%",padding:"14px 0",borderRadius:T.radiusSm,border:"none",background:`linear-gradient(135deg,${T.green},#16A34A)`,color:"#fff",fontFamily:"'Prompt',sans-serif",fontWeight:700,fontSize:16,cursor:"pointer",boxShadow:`0 4px 14px ${T.green}50`,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <span>✅</span> ลูกค้าโอนแล้ว / ยืนยัน
              </button>
              <Btn onClick={onClose} variant="ghost" style={{width:"100%"}}>❌ ยกเลิก</Btn>
            </div>
          </>
        )}
      </div>
    </Modal>
  );
}

// ══ Mini Bar Chart ═══════════════════════════════
function MiniBarChart({data,height=80}){
  if(!data||data.length===0) return <div style={{textAlign:"center",color:T.textMuted,padding:20,fontSize:13}}>ยังไม่มีข้อมูล</div>;
  const max=Math.max(...data.map(d=>d.v),1);
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:4,height,paddingTop:8}}>
      {data.map(d=>{
        const pct=d.v/max;
        const isToday=d.k===todayKey();
        return(
          <div key={d.k} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <div style={{fontSize:9,color:T.textMuted,fontWeight:600}}>{d.v>0?`฿${fmtShort(d.v)}`:""}</div>
            <div style={{width:"100%",background:isToday?T.accent:T.blue,borderRadius:"3px 3px 0 0",height:`${Math.max(pct*100,2)}%`,opacity:isToday?1:0.5,transition:"height 0.3s"}}/>
            <div style={{fontSize:8,color:isToday?T.accent:T.textMuted,fontWeight:isToday?700:400,whiteSpace:"nowrap"}}>{d.label}</div>
          </div>
        );
      })}
    </div>
  );
}

function AdminPinChanger({current,onChange}){
  const [oldPin,setOldPin]=useState("");const [newPin,setNewPin]=useState("");const [conf,setConf]=useState("");const [msg,setMsg]=useState(null);
  const save=()=>{
    if(oldPin!==current){setMsg({ok:false,text:"รหัสเก่าไม่ถูกต้อง"});return;}
    if(newPin.length<4){setMsg({ok:false,text:"รหัสใหม่ต้องมีอย่างน้อย 4 ตัว"});return;}
    if(newPin!==conf){setMsg({ok:false,text:"รหัสยืนยันไม่ตรงกัน"});return;}
    onChange(newPin);setOldPin("");setNewPin("");setConf("");setMsg({ok:true,text:"เปลี่ยนรหัสสำเร็จ ✅"});
  };
  const inp={border:`1.5px solid ${T.border}`,borderRadius:T.radiusSm,padding:"9px 12px",fontSize:14,outline:"none",background:T.bg,color:T.text,width:"100%",boxSizing:"border-box",marginBottom:10,fontFamily:"'Sarabun',sans-serif"};
  return(
    <div>
      <input type="password" placeholder="รหัสเก่า" value={oldPin} onChange={e=>setOldPin(e.target.value)} style={inp}/>
      <input type="password" placeholder="รหัสใหม่" value={newPin} onChange={e=>setNewPin(e.target.value)} style={inp}/>
      <input type="password" placeholder="ยืนยันรหัสใหม่" value={conf} onChange={e=>setConf(e.target.value)} style={{...inp,marginBottom:12}}/>
      {msg&&<div style={{fontSize:13,color:msg.ok?T.green:T.red,marginBottom:10}}>{msg.text}</div>}
      <Btn onClick={save} variant="primary" style={{width:"100%",padding:"10px 0"}}>บันทึกรหัสใหม่</Btn>
    </div>
  );
}

// ══ useOrientation hook ══════════════════════════
// ตรวจสอบว่าอยู่ใน mobile/tablet landscape หรือไม่
function useIsMobileLandscape() {
  const check = () =>
    (window.innerHeight <= 600 && window.innerWidth > window.innerHeight) ||
    (window.innerWidth <= 900 && window.innerWidth > window.innerHeight);
  const [val, setVal] = useState(check);
  useEffect(() => {
    const handler = () => setVal(check());
    window.addEventListener("resize", handler);
    window.addEventListener("orientationchange", handler);
    return () => {
      window.removeEventListener("resize", handler);
      window.removeEventListener("orientationchange", handler);
    };
  }, []);
  return val;
}

        </div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}} className="report-grid-2">
        <Card style={{padding:12}}>
          <div style={{fontWeight:700,marginBottom:8,fontSize:12}}>🏆 สินค้าขายดี</div>
          {topItems().length===0?<div style={{color:T.textMuted,fontSize:12}}>ยังไม่มีข้อมูล</div>
            :topItems().map(([name,qty],i)=>(
              <div key={name} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:i<topItems().length-1?`1px solid ${T.border}`:"none"}}>
                <span style={{fontSize:11}}>{["🥇","🥈","🥉","4️⃣","5️⃣"][i]} {name}</span>
                <span style={{fontWeight:700,color:T.accent,fontSize:11}}>{typeof qty==="number"&&qty%1!==0?qty.toFixed(2)+" กก.":`${qty} ชิ้น`}</span>
              </div>
            ))}
        </Card>
        <Card style={{padding:12}}>
          <div style={{fontWeight:700,marginBottom:8,fontSize:12}}>🕐 บิลล่าสุด</div>
          {rSales.length===0?<div style={{color:T.textMuted,fontSize:12}}>ยังไม่มีการขาย</div>
            :[...rSales].reverse().slice(0,7).map(o=>(
              <div key={o.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:`1px solid ${T.border}`}}>
                <div><div style={{fontSize:11}}>{o.time}</div><div style={{fontSize:9,color:T.textMuted}}>{o.method==="cash"?"💵":"📱"} {o.sellerName||""}</div></div>
                <span style={{fontWeight:700,color:T.accent,fontSize:12}}>฿{fmt(o.total)}</span>
              </div>
            ))}
        </Card>
      </div>
    </div>
  );

  // ── History Modal ─────────────────────────────
  const historyModal = showHistory&&(
    <Modal onClose={()=>setShowHistory(false)} width={480}>
      <div style={{fontFamily:"'Prompt',sans-serif",fontWeight:700,fontSize:16,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>📋 ประวัติการขาย</span>
        <select value={historyDate} onChange={e=>setHistoryDate(e.target.value)}
          style={{border:`1px solid ${T.border}`,borderRadius:T.radiusSm,padding:"5px 7px",fontSize:12,outline:"none",background:T.bg,color:T.text}}>
          {allDates.length===0&&<option value={todayKey()}>วันนี้</option>}
          {allDates.map(d=><option key={d} value={d}>{d}</option>)}
        </select>
      </div>
      {(sales[historyDate]||[]).length===0
        ?<div style={{textAlign:"center",color:T.textMuted,padding:24}}>ยังไม่มีการขาย</div>
        :<div style={{display:"flex",flexDirection:"column",gap:7}}>
          {[...(sales[historyDate]||[])].reverse().map(o=>(
            <div key={o.id} style={{background:T.bg,borderRadius:T.radiusSm,padding:"10px 12px",border:`1px solid ${T.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <div>
                  <span style={{fontWeight:700,color:T.text,fontSize:12}}>{o.time}</span>
                  {o.sellerName&&<span style={{fontSize:11,color:T.textMuted,marginLeft:6}}>· {o.sellerName}</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <span style={{fontWeight:700,color:T.accent,fontSize:13}}>฿{fmt(o.total)}</span>
                  {isOwner&&<button onClick={()=>{if(window.confirm("ลบรายการนี้? (สต็อกจะถูกคืน)")) deleteOrder(historyDate,o.id);}}
                    style={{background:T.redLight,border:"none",borderRadius:5,color:T.red,cursor:"pointer",padding:"2px 6px",fontSize:11}}>🗑️</button>}
                </div>
              </div>
              <div style={{fontSize:11,color:T.textSub}}>{o.method==="cash"?"💵 เงินสด":"📱 พร้อมเพย์"} · {o.items.length} รายการ</div>
              <div style={{fontSize:11,color:T.textMuted,marginTop:1}}>{o.items.map(i=>i.name).join(", ")}</div>
            </div>
          ))}
        </div>
      }
      {isOwner&&<div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${T.border}`,display:"flex",gap:8}}>
        <Btn onClick={()=>{if(window.confirm(`ลบประวัติทั้งหมดของ ${historyDate}?`)){(sales[historyDate]||[]).forEach(o=>{setProducts(prev=>prev.map(p=>{const sold=o.items.filter(i=>i.id===p.id);if(!sold.length) return p;const u=sold.reduce((s,i)=>s+(i.byWeight?i.weight:i.qty),0);return{...p,stock:Math.round((p.stock+u)*1000)/1000};}));});setSales(p=>{const n={...p};delete n[historyDate];return n;});}}} variant="danger" style={{flex:1,fontSize:12}}>🗑️ ลบวันนี้</Btn>
        <Btn onClick={()=>{if(window.confirm("ลบประวัติทั้งหมด?")) setSales({});}} variant="ghost" style={{flex:1,fontSize:12,color:T.red,borderColor:T.red}}>⚠️ ลบทั้งหมด</Btn>
      </div>}
    </Modal>
  );

  const navTabs = [
    {k:"pos",icon:"🛒",lbl:"ขาย"},
    {k:"stock",icon:"📦",lbl:"สต็อก"},
    ...(isOwner?[{k:"admin",icon:"⚙️",lbl:"จัดการ"}]:[]),
    {k:"report",icon:"📊",lbl:"รายงาน"},
  ];

  // คำนวณความสูงของ header สำหรับ landscape
  const headerH = isMobileLandscape ? 42 : 0;

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:T.bg,fontFamily:"'Sarabun',sans-serif",overflow:"hidden"}}>
      {/* Modals */}
      {inputModal&&<InputModal product={inputModal} itemDiscounts={settings.itemDiscounts||{}} onAdd={addWeight} onClose={()=>setInputModal(null)}/>}
      {showQRModal&&<QRPayModal total={total} promptPayPhone={settings.promptPayPhone} onConfirm={()=>completeCheckout("qr")} onClose={()=>{setShowQRModal(false);setPendingQRId(null);}} orderId={pendingQRId}/>}
      {showReceipt&&lastOrder&&<ReceiptModal order={lastOrder} onClose={()=>setShowReceipt(false)}/>}
      {showCloseShift&&<CloseShiftModal sales={sales} sellerName={currentSeller} onClose={()=>setShowCloseShift(false)}/>}
      {historyModal}

      {/* Mobile / Landscape Header */}
      <div className="app-header">
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontFamily:"'Prompt',sans-serif",fontWeight:800,fontSize:15,color:T.accent}}>🛒 POS</span>
          <SyncBadge ready={ready}/>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <div style={{fontSize:11,background:isOwner?T.accentLight:T.blueLight,color:isOwner?T.accent:T.blue,borderRadius:20,padding:"2px 8px",fontWeight:600}}>
            {isOwner?"👑":"🧑‍💼"} {currentSeller}
          </div>
          <button onClick={()=>setShowCloseShift(true)} style={{background:T.greenLight,border:"none",borderRadius:6,cursor:"pointer",padding:"4px 8px",fontSize:11,color:T.green,fontWeight:700}}>🏁</button>
          <button onClick={()=>setCurrentSeller(null)} style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:"50%",width:28,height:28,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>👤</button>
        </div>
      </div>

      {/* Main layout */}
      <div style={{display:"flex",flex:1,overflow:"hidden"}} className="main-layout">

        {/* Desktop Sidebar */}
        <div className="desktop-sidebar" style={{width:66,background:T.surface,display:"flex",flexDirection:"column",alignItems:"center",paddingTop:14,gap:4,borderRight:`1px solid ${T.border}`,flexShrink:0}}>
          <div style={{textAlign:"center",marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:800,color:T.accent,fontFamily:"'Prompt',sans-serif",lineHeight:1}}>POS</div>
            <div style={{fontSize:7,color:T.textMuted,lineHeight:1}}>v5</div>
          </div>
          {navTabs.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)}
              style={{width:50,height:50,borderRadius:T.radiusSm,border:"none",cursor:"pointer",background:tab===t.k?T.accentLight:"transparent",color:tab===t.k?T.accent:T.textMuted,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,fontSize:20,transition:"all 0.15s",boxShadow:tab===t.k?`inset 0 0 0 1.5px ${T.accent}`:"none",position:"relative"}}>
              <span>{t.icon}</span>
              <span style={{fontSize:9,fontWeight:700,fontFamily:"'Prompt',sans-serif"}}>{t.lbl}</span>
              {t.k==="stock"&&(lowStockItems.length+outOfStockItems.length)>0&&(
                <span style={{position:"absolute",top:4,right:4,background:T.red,color:"#fff",fontSize:8,fontWeight:700,borderRadius:10,minWidth:13,height:13,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 2px"}}>{lowStockItems.length+outOfStockItems.length}</span>
              )}
            </button>
          ))}
          <div style={{flex:1}}/>
          <SyncBadge ready={ready}/>
          <div style={{height:6}}/>
          <button onClick={()=>setShowCloseShift(true)} style={{width:42,height:42,borderRadius:T.radiusSm,border:`1.5px solid ${T.border}`,background:T.greenLight,cursor:"pointer",marginBottom:5,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontSize:15,gap:1}}>
            🏁<span style={{fontSize:7,color:T.green,fontWeight:700,fontFamily:"'Prompt',sans-serif"}}>ปิดกะ</span>
          </button>
          <button onClick={()=>setCurrentSeller(null)}
            style={{width:38,height:38,borderRadius:"50%",border:`2px solid ${isOwner?T.accent:T.border}`,background:isOwner?T.accentLight:T.bg,cursor:"pointer",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>
            {isOwner?"👑":"👤"}
          </button>
        </div>

        {/* Content */}
        <div style={{flex:1,display:"flex",overflow:"hidden",minWidth:0}}>
          {tab==="pos"&&renderPOS()}
          {tab==="stock"&&renderStock()}
          {tab==="admin"&&renderAdmin()}
          {tab==="report"&&renderReport()}
        </div>
      </div>

      {/* Mobile / Landscape Bottom Nav */}
      <nav className="mobile-nav">
        {navTabs.map(t=>(
          <button key={t.k} className={`mobile-nav-btn ${tab===t.k?"active":""}`} onClick={()=>setTab(t.k)}
            style={{position:"relative"}}>
            <span style={{fontSize:20,filter:tab===t.k?"none":"grayscale(0.5) opacity(0.6)"}}>{t.icon}</span>
            <span style={{color:tab===t.k?T.accent:T.textMuted,fontFamily:"'Prompt',sans-serif",fontWeight:700,fontSize:9}}>{t.lbl}</span>
            {t.k==="stock"&&(lowStockItems.length+outOfStockItems.length)>0&&(
              <span style={{position:"absolute",top:2,right:"16%",background:T.red,color:"#fff",fontSize:8,fontWeight:700,borderRadius:10,minWidth:14,height:14,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px"}}>{lowStockItems.length+outOfStockItems.length}</span>
            )}
          </button>
        ))}
        <button className="mobile-nav-btn" onClick={()=>setShowCloseShift(true)}>
          <span style={{fontSize:20,opacity:0.7}}>🏁</span>
          <span style={{color:T.textMuted,fontFamily:"'Prompt',sans-serif",fontWeight:700,fontSize:9}}>ปิดกะ</span>
        </button>
        <button className="mobile-nav-btn" onClick={()=>setCurrentSeller(null)}>
          <span style={{fontSize:20,opacity:0.7}}>{isOwner?"👑":"👤"}</span>
          <span style={{color:T.textMuted,fontFamily:"'Prompt',sans-serif",fontWeight:700,fontSize:9}}>ออก</span>
        </button>
      </nav>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<POSApp/>);
</script>
</body>
</html>
